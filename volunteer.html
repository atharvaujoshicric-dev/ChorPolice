<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Safe Zone Volunteer</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1 id="playerName">Volunteer</h1>
    <a href="#" class="logout" onclick="logout()">Logout</a>
  </div>

  <div class="card">
    <h3>Your Safe Zone</h3>
    <div id="checkpostName" class="badge stamped" style="font-size:16px;"></div>
    <p class="muted" style="margin-top:8px;">Remember: max 10 chors physically inside at once. Scan each chor as they arrive — sticker is awarded instantly.</p>
  </div>

  <div class="card">
    <button id="startScanBtn">📷 Start Scanning</button>
    <button id="stopScanBtn" class="secondary" style="display:none;">Stop Camera</button>
    <div id="reader" style="display:none;"></div>
    <p class="muted" style="margin-top:12px;">Camera not working? Type the chor's code instead:</p>
    <input id="manualCode" placeholder="e.g. AB12CD" autocapitalize="characters" autocomplete="off" />
    <button id="manualAddBtn" class="secondary">Award Sticker by Code</button>
  </div>

  <div class="card">
    <h3>Last scan</h3>
    <div id="resultBox" class="muted">No scans yet.</div>
  </div>

  <div class="card">
    <h3>Recent activity at this zone</h3>
    <div id="recentList" class="muted">Nothing yet.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/volunteer.js"></script>
</body>
</html>
